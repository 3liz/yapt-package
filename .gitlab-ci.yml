variables:
  PACKAGE_NAME: yapt-package

stages:
  - build
  - deploy

build:
  image: ${REGISTRY_URL}/factory-ci-runner:rust-noble
  tags:
    - factory-plain
  stage: build
  script:
    - maturin build --release --strip
    - strip target/release/$(make echo-name)
    - echo "PACKAGE=`make package VERSION=latest`" > build.env
    - echo "WHEEL=`ls -1 target/wheels/$PACKAGE_NAME-*.whl`" >> build.env
    - cat build.env
  cache:
    - key: cache-$CI_COMMIT_REF_SLUG
      paths:
        - target/release
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - "*.tar.gz"
      - "target/wheels/$PACKAGE_NAME-*.whl"
    expire_in: 1 week


deploy:
    image: $REGISTRY_URI/factory-ci-runner:fabric-ci
    tags:
      - fabric
    stage: deploy
    rules:
      - if: $RELEASE_BRANCH == "true"
    dependencies:
      - build
    script:
      - upload_to_packages_server ${PACKAGE} pub/yapt/
      - upload_to_packages_server ${WHEEL} pub/whl/$PACKAGE_NAME/
